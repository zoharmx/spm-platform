name: CI — Lint, Test & Coverage

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint . --max-warnings 0 || true

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage
        env:
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
          NEXT_PUBLIC_APP_URL: https://spm-test.vercel.app

      - name: Check coverage thresholds
        run: |
          node -e "
            const summary = require('./coverage/coverage-summary.json');
            const total = summary.total;
            const metrics = ['statements', 'branches', 'functions', 'lines'];
            let failed = false;
            for (const m of metrics) {
              const pct = total[m].pct;
              console.log(m + ': ' + pct + '%');
              if (pct < 70) {
                console.error('FAIL: ' + m + ' coverage ' + pct + '% is below 70% threshold');
                failed = true;
              }
            }
            if (failed) process.exit(1);
            console.log('All coverage thresholds passed.');
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;
            const body = `## 📊 Coverage Report

            | Metric | Coverage |
            |--------|----------|
            | Statements | ${t.statements.pct}% |
            | Branches | ${t.branches.pct}% |
            | Functions | ${t.functions.pct}% |
            | Lines | ${t.lines.pct}% |

            > Threshold: 70% minimum`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
